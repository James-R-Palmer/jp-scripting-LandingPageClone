<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Mockup B</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-wrapper">
            <a href="#" class="logo">Name</a>
            <ul class="nav-links">
                <li><a href="#projects">Projects</a></li>
                <li><a href="#skills">Skills</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero">
        <div class="container hero-wrapper">
            <div class="hero-text">
                <h1>Hello, I'm [Name]</h1>
                <p>Welcome to my portfolio.</p>
                <a href="#contact" class="btn">Contact Me</a>
            </div>
            <div class="hero-image">
                <img src="headshot.jpg" alt="Professional headshot of [Name]">
            </div>
        </div>
    </header>

    <section id="projects" class="projects">
        <div class="container">
            <h2>Projects</h2>
            <div class="project-grid">
                <!-- 6 Cards -->
                <div class="card">Project 1</div>
                <div class="card">Project 2</div>
                <div class="card">Project 3</div>
                <div class="card">Project 4</div>
                <div class="card">Project 5</div>
                <div class="card">Project 6</div>
            </div>
        </div>
    </section>

    <section id="skills" class="skills">
        <div class="container">
            <h2>Skills & Timeline</h2>
            <!-- Skills/Timeline content -->
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Portfolio</p>
        </div>
    </footer>
</body>
</html>
